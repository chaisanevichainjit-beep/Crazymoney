name: 🚀 CrazyGames Bot (5-Min Proof + 6-Hour Run)

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Forces the max 6 hour runtime
    
    steps:
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install selenium

      - name: 📝 Generate Bot Script
        run: |
          cat << 'EOF' > bot.py
          import time
          import sys
          import random
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          def setup_driver():
              options = Options()
              options.add_argument("--headless=new")
              options.add_argument("--window-size=1920,1080") # High-res so screenshots look good
              options.add_argument("--mute-audio")
              options.add_argument("--disable-blink-features=AutomationControlled")
              # These two are required for Linux servers:
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              
              print("🚀 Launching Google Chrome...", flush=True)
              return webdriver.Chrome(options=options)

          def focus_and_find_game(driver):
              """Locates the game frame and scrolls down to it so screenshots work properly."""
              driver.switch_to.default_content()
              try:
                  frame = driver.find_element(By.ID, "game-iframe")
                  driver.execute_script("arguments[0].scrollIntoView({block: 'center'});", frame)
                  time.sleep(1)
                  driver.switch_to.frame(frame)
                  nested_iframes = driver.find_elements(By.TAG_NAME, "iframe")
                  if len(nested_iframes) > 0:
                      driver.switch_to.frame(nested_iframes[0])
                  print("✅ Successfully connected to the Game Canvas!", flush=True)
                  return True
              except Exception:
                  iframes = driver.find_elements(By.TAG_NAME, "iframe")
                  for i, frame in enumerate(iframes):
                      if frame.size['width'] > 300 and frame.size['height'] > 300:
                          driver.execute_script("arguments[0].scrollIntoView({block: 'center'});", frame)
                          time.sleep(1)
                          driver.switch_to.frame(frame)
                          print(f"✅ Switched to fallback iframe ({i})", flush=True)
                          return True
              return False

          # === FROM YOUR LOCAL CODE ===
          def is_button_visible(driver, button_id):
              script = f"""
              var btn = document.getElementById('{button_id}');
              return (btn && btn.offsetParent !== null && !btn.closest('.hidden'));
              """
              try:
                  return driver.execute_script(script)
              except:
                  return False

          def click_html_button(driver, button_id):
              script = f"document.getElementById('{button_id}').click();"
              try:
                  driver.execute_script(script)
              except:
                  pass

          def spam_virtual_clicks(driver):
              script = """
              var canvas = document.querySelector('canvas');
              if (canvas && canvas.offsetParent !== null) {
                  var rect = canvas.getBoundingClientRect();
                  for (let i = 0; i < 10; i++) {
                      var x = Math.random() * rect.width;
                      var y = Math.random() * rect.height;
                      var ev = new PointerEvent('pointerdown', {
                          clientX: rect.left + x,
                          clientY: rect.top + y,
                          bubbles: true,
                          cancelable: true
                      });
                      canvas.dispatchEvent(ev);
                  }
              }
              """
              try:
                  driver.execute_script(script)
              except:
                  pass

          def wake_up_crazygames(driver):
              try:
                  body = driver.find_element(By.TAG_NAME, 'body')
                  webdriver.ActionChains(driver).move_to_element(body).click().perform()
              except:
                  pass
          # ==============================

          def main():
              is_test_mode = "--test" in sys.argv
              driver = setup_driver()
              
              print("⏳ Loading CrazyGames: Slide Rush...", flush=True)
              driver.get("https://www.crazygames.com/game/slide-rush?bypassCache=4482f")
              
              print("⏳ Waiting 15 seconds for site to load...", flush=True)
              time.sleep(15)

              if not focus_and_find_game(driver):
                  print("❌ Failed to find game iframe. Exiting.", flush=True)
                  driver.quit()
                  return

              print("🖱️ Waking up the game frame...", flush=True)
              wake_up_crazygames(driver)
              time.sleep(1)
              
              if is_test_mode:
                  print("\n🧪 PHASE 1: 5-Minute Proof Run Started!", flush=True)
                  run_duration = 300 # 5 minutes
              else:
                  print("\n♾️ PHASE 2: 6-Hour Infinite Run Started!", flush=True)
                  run_duration = 21600 # 6 hours
              
              start_time = time.time()
              loop_count = 0
              
              try:
                  while True:
                      # Check if time is up
                      if time.time() - start_time > run_duration:
                          if is_test_mode:
                              print("\n📸 Time is up! Taking proof screenshot...", flush=True)
                              driver.switch_to.default_content() 
                              driver.save_screenshot("proof_gameplay.png")
                          break

                      # --- YOUR EXACT GAME LOGIC ---
                      if is_button_visible(driver, "btn-infinite"):
                          print("⏳ Main menu detected! Waiting 1.5 seconds...", flush=True)
                          time.sleep(1.5)
                          click_html_button(driver, "btn-infinite")
                          print("🎮 Clicked: Survival Mode!", flush=True)
                          time.sleep(1)
                          
                      elif is_button_visible(driver, "next-level-btn"):
                          print("⏳ Level Ended! Waiting 2 seconds...", flush=True)
                          time.sleep(2.0)
                          click_html_button(driver, "next-level-btn")
                          print("⏭️ Clicked: Next Level / Continue!", flush=True)
                          time.sleep(1)
                          
                      else:
                          spam_virtual_clicks(driver)
                      # -----------------------------

                      time.sleep(0.1)
                      loop_count += 1
                      
                      # Print live update so you know it hasn't frozen
                      if loop_count % 50 == 0:
                          mins_running = round((time.time() - start_time) / 60, 1)
                          print(f"🔄 Bot active... ({mins_running} minutes elapsed)", flush=True)
                          
              except Exception as e:
                  print(f"\n❌ Error: {e}", flush=True)
                  driver.switch_to.default_content()
                  driver.save_screenshot("error_crash.png")
              finally:
                  driver.quit()

          if __name__ == "__main__":
              main()
          EOF

      - name: 🧪 PHASE 1 - Run for 5 Minutes & Take Screenshot
        run: python bot.py --test

      - name: 📸 Upload Screenshot Proof to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Proof-Screenshot
          path: "*.png"

      - name: ♾️ PHASE 2 - Run for the remaining 6 Hours
        run: python bot.py --infinite
