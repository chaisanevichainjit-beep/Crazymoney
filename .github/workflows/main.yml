name: 🚀 CrazyGames Bot (5-Min Proof + 6-Hour Run)

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Forces the max 6 hour runtime
    
    steps:
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install selenium

      - name: 📝 Generate Bot Script
        run: |
          cat << 'EOF' > bot.py
          import time
          import sys
          import random
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By

          def setup_driver():
              options = Options()
              options.add_argument("--headless=new")
              options.add_argument("--window-size=1920,1080")
              options.add_argument("--mute-audio")
              options.add_argument("--disable-blink-features=AutomationControlled")
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              return webdriver.Chrome(options=options)

          def focus_and_find_game(driver):
              """Scrolls the page so the game is dead-center, then connects to it."""
              driver.switch_to.default_content()
              try:
                  frame = driver.find_element(By.ID, "game-iframe")
                  driver.execute_script("arguments[0].scrollIntoView({block: 'center'});", frame)
                  time.sleep(1)
                  
                  driver.switch_to.frame(frame)
                  nested_iframes = driver.find_elements(By.TAG_NAME, "iframe")
                  if len(nested_iframes) > 0:
                      driver.switch_to.frame(nested_iframes[0])
                  print("✅ Scrolled to game and connected to Canvas!", flush=True)
                  return True
              except:
                  iframes = driver.find_elements(By.TAG_NAME, "iframe")
                  for i, frame in enumerate(iframes):
                      if frame.size['width'] > 300 and frame.size['height'] > 300:
                          driver.execute_script("arguments[0].scrollIntoView({block: 'center'});", frame)
                          time.sleep(1)
                          driver.switch_to.frame(frame)
                          print(f"✅ Scrolled to fallback iframe ({i})", flush=True)
                          return True
              return False

          def handle_html_menus(driver):
              """Uses the exact HTML IDs from the game's source code to navigate menus."""
              script = """
              // 1. Check for Survival Mode Button
              let btnInf = document.getElementById('btn-infinite');
              if (btnInf && btnInf.offsetParent !== null && !btnInf.closest('.hidden')) {
                  btnInf.click();
                  return 'CLICKED_SURVIVAL';
              }
              // 2. Check for Next Level Button
              let btnNext = document.getElementById('next-level-btn');
              if (btnNext && btnNext.offsetParent !== null && !btnNext.closest('.hidden')) {
                  btnNext.click();
                  return 'CLICKED_NEXT';
              }
              // 3. Check for Restart Button (If game over)
              let btnRestart = document.getElementById('restart-btn');
              if (btnRestart && btnRestart.offsetParent !== null && !btnRestart.closest('.hidden')) {
                  btnRestart.click();
                  return 'CLICKED_RESTART';
              }
              return 'NO_MENU';
              """
              try:
                  return driver.execute_script(script)
              except:
                  return 'ERROR'

          def spam_game_inputs(driver):
              """Simulates pointerdown events inside the canvas bounds as requested by the game code."""
              script = """
              var canvas = document.querySelector('canvas');
              if (canvas && canvas.offsetParent !== null) {
                  var rect = canvas.getBoundingClientRect();
                  
                  // Send 3 random clicks per loop iteration
                  for(let i=0; i<3; i++) {
                      var x = rect.left + (Math.random() * rect.width);
                      var y = rect.top + (Math.random() * rect.height);
                      
                      var down = new PointerEvent('pointerdown', {clientX: x, clientY: y, bubbles: true});
                      canvas.dispatchEvent(down);
                  }
              }
              """
              try:
                  driver.execute_script(script)
              except:
                  pass

          def main():
              is_test_mode = "--test" in sys.argv
              
              print("🚀 Launching Google Chrome...", flush=True)
              driver = setup_driver()
              
              print("⏳ Loading CrazyGames: Slide Rush...", flush=True)
              driver.get("https://www.crazygames.com/game/slide-rush?bypassCache=4482f")
              
              print("⏳ Waiting 15 seconds for site to load...", flush=True)
              time.sleep(15)

              if not focus_and_find_game(driver):
                  print("❌ Failed to find game iframe. Exiting.", flush=True)
                  driver.save_screenshot("error_no_iframe.png")
                  driver.quit()
                  return
              
              if is_test_mode:
                  print("\n🧪 PHASE 1: 5-Minute Proof Run Started!", flush=True)
                  run_duration = 300 # 5 minutes
              else:
                  print("\n♾️ PHASE 2: 6-Hour Infinite Run Started!", flush=True)
                  run_duration = 21600 # 6 hours
              
              start_time = time.time()
              loop_count = 0
              
              try:
                  while True:
                      if time.time() - start_time > run_duration:
                          if is_test_mode:
                              print("\n📸 Time is up! Taking proof screenshot...", flush=True)
                              driver.switch_to.default_content() 
                              driver.save_screenshot("proof_gameplay.png")
                          break

                      loop_count += 1
                      
                      # 1. First, check if there are any menus open and click them
                      menu_status = handle_html_menus(driver)
                      
                      if menu_status != 'NO_MENU' and menu_status != 'ERROR':
                          print(f"🕹️ UI Interacted: {menu_status}", flush=True)
                          time.sleep(1.5) # Give the game a second to transition after clicking a menu
                      else:
                          # 2. If no menus are open, spam the game board!
                          spam_game_inputs(driver)
                      
                      # Print live update every ~30 seconds
                      if loop_count % 150 == 0:
                          mins_running = round((time.time() - start_time) / 60, 1)
                          print(f"🔄 Bot is playing... ({mins_running} minutes elapsed | {loop_count} inputs sent)", flush=True)

                      time.sleep(0.2)
                      
              except Exception as e:
                  print(f"\n❌ Error: {e}", flush=True)
                  driver.switch_to.default_content()
                  driver.save_screenshot("error_crash.png")
              finally:
                  driver.quit()

          if __name__ == "__main__":
              main()
          EOF

      - name: 🧪 PHASE 1 - Run for 5 Minutes & Take Screenshot
        run: python bot.py --test

      - name: 📸 Upload Screenshot Proof to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Proof-Screenshot
          path: "*.png"

      - name: ♾️ PHASE 2 - Run for the remaining 6 Hours
        run: python bot.py --infinite
